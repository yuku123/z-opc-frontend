name: publish-to-npm

# Standalone z-opc-frontend repo: build all packages and publish to npm.
# Trigger: any tag matching v* (e.g. v0.1.2) — created either manually with
# `git tag v0.1.2 && git push --tags`, or by the release.yml workflow.
# Also supports manual workflow_dispatch for re-running.
#
# Required secrets:
#   NPM_TOKEN — npm Automation token (https://www.npmjs.com/settings/.../tokens)
#
# This workflow publishes ALL public packages. To skip a package, mark it
# `"private": true` in its package.json.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write   # required for npm publish --provenance (OIDC)

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: |
            ~/.npm
            **/node_modules
          key: ${{ runner.os }}-npm-publish-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-publish-

      - name: Install dependencies (lockfile as input, workspace-compatible)
        run: npm install --no-audit --no-fund

      # Build every public workspace that has a `build` script. Skip packages
      # without one (treat them as "publish-only metadata" rather than failing
      # the whole pipeline). Order doesn't matter for build — none of the
      # packages have runtime dependencies on each other (only peer deps).
      - name: Build all packages
        run: |
          set -e
          PKGS=$(node -e "
            const fs=require('fs'),path=require('path');
            process.stdout.write(
              fs.readdirSync('packages',{withFileTypes:true})
                .filter(d=>d.isDirectory())
                .filter(d=>{
                  const p=require(path.resolve('packages',d.name,'package.json'));
                  return p.private!==true && p.name && p.version;
                })
                .filter(d=>{
                  const p=require(path.resolve('packages',d.name,'package.json'));
                  return p.scripts && typeof p.scripts.build === 'string' && p.scripts.build.length>0;
                })
                .map(d=>'packages/'+d.name)
                .sort((a,b)=>{
                  // z-frontend-common must be built first (other packages depend on its dist)
                  if (a.includes('z-frontend-common')) return -1;
                  if (b.includes('z-frontend-common')) return 1;
                  return a.localeCompare(b);
                })
                .join('\n')
            );
          ")
          echo "=== packages to build ==="
          echo "$PKGS"
          BUILT=0; SKIPPED=0
          for pkg in $PKGS; do
            echo "--- build $pkg ---"
            (cd "$pkg" && npm run build)
            BUILT=$((BUILT+1))
          done
          # Count skipped for the report
          ALL_PKGS=$(node -e "
            const fs=require('fs'),path=require('path');
            process.stdout.write(String(
              fs.readdirSync('packages',{withFileTypes:true})
                .filter(d=>d.isDirectory())
                .filter(d=>{
                  const p=require(path.resolve('packages',d.name,'package.json'));
                  return p.private!==true && p.name && p.version;
                }).length
            ));
          ")
          SKIPPED=$((ALL_PKGS - BUILT))
          echo "::notice::built $BUILT packages, skipped $SKIPPED (no build script)"

      # Publish in topological order so peer-dep packages (@yuku123/z-frontend-common)
      # are available on the registry before dependents (@yuku123/z-ctc-frontend-component
      # peer-deps on z-frontend-common). Simple approach: publish z-frontend-common first,
      # then everything else.
      - name: Publish all packages to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -e
          PKGS=$(node -e "
            const fs=require('fs'),path=require('path');
            process.stdout.write(
              fs.readdirSync('packages',{withFileTypes:true})
                .filter(d=>d.isDirectory())
                .filter(d=>{
                  const p=require(path.resolve('packages',d.name,'package.json'));
                  return p.private!==true && p.name && p.version;
                })
                .map(d=>'packages/'+d.name)
                .sort((a,b)=>{
                  // z-frontend-common first; others alphabetical
                  const ax=a.includes('z-frontend-common')?0:1;
                  const bx=b.includes('z-frontend-common')?0:1;
                  return ax-bx || a.localeCompare(b);
                })
                .join('\n')
            );
          ")
          echo "=== packages to publish ==="
          echo "$PKGS"
          PUBLISHED=0; SKIPPED=0; FAILED=0
          for pkg in $PKGS; do
            echo ""
            echo "--- publishing $pkg ---"
            # Skip if version already exists on npm
            NAME=$(node -e "console.log(require('./$pkg/package.json').name)")
            VER=$(node -e "console.log(require('./$pkg/package.json').version)")
            if npm view "$NAME@$VER" version >/dev/null 2>&1; then
              echo "::notice::$NAME@$VER already published, skipping"
              SKIPPED=$((SKIPPED+1))
              continue
            fi
            if (cd "$pkg" && npm publish --access public --provenance); then
              PUBLISHED=$((PUBLISHED+1))
            else
              echo "::error::failed to publish $pkg"
              FAILED=$((FAILED+1))
            fi
          done
          echo "::notice::Published $PUBLISHED, Skipped $SKIPPED, Failed $FAILED"
          if [ "$FAILED" -gt 0 ]; then exit 1; fi

      - name: Publish success notification
        if: success()
        run: |
          echo "✅ Published z-opc-frontend packages to https://registry.npmjs.org/"
          echo "Tag: ${GITHUB_REF_NAME}"

      - name: Publish failure notification
        if: failure()
        run: |
          echo "❌ Publish failed. Common causes:"
          echo "  - Version already exists on npm (bump the version and re-tag)"
          echo "  - NPM_TOKEN is missing or expired (need an Automation token)"
          echo "  - Build failed in one of the packages — check the build step logs"